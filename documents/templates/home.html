{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
  <title>N+数据管理小站</title>
<link rel="stylesheet" href="{% static 'css/home.css' %}">
<script src="{% static 'js/particles.min.js' %}"></script>
<style>
body, html {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC","Source Han Sans SC",sans-serif;
    overflow:hidden;
}
#particles-js {
    position:absolute;
    width:100%;
    height:100%;
    background:#0a3b66;
}

.login-container {
    position: absolute;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.05);
    padding:40px;
    border-radius:12px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
    text-align:center;
    width: 360px;
}
.login-container h1 {
    color:#fff;
    font-size:28px;
    margin-bottom:18px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}
.login-container input {
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:6px;
    border:none;
}
.login-container select {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:6px;
  border:none;
}
.login-container button {
    width:100%;
    padding:12px;
    margin-top:12px;
    background:#00bfff;
    border:none;
    border-radius:6px;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}
.login-container button:hover {background:#009acd; transform:scale(1.03);}
.login-container label {color:#fff; font-size:14px; display:block; margin-top:8px;}
.login-container p.message {color:#ff6b6b; font-size:14px; margin:5px 0;}
.hint {color:#cde6ff; font-size:12px; margin-top:6px;}
</style>
</head>
<body>

<div id="particles-js"></div>

<div class="login-container">
    <h1>N+数据管理小站</h1>
    {% if messages %}
      {% for message in messages %}
        <p class="message">{{ message }}</p>
      {% endfor %}
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="用户名" required>
        <input type="password" name="password" placeholder="密码" required>
        <label for="remember_period">免登录时长</label>
        <select name="remember_period" id="remember_period">
          <option value="">仅当前会话</option>
          <option value="7d">一周内免登录</option>
          <option value="30d">一个月内免登录</option>
          <option value="180d">半年内免登录</option>
        </select>
        <div class="hint">不会保存明文密码，仅设置登录会话有效期</div>
        <button type="submit">立即登录</button>
    </form>
</div>

<script>
particlesJS('particles-js', {
  "particles": {
    "number": {"value": 70, "density": {"enable": true, "value_area": 800}},
    "color": {"value": "#00bfff"},
    "shape": {"type": "circle"},
    "opacity": {"value": 0.5, "random": true},
    "size": {"value": 3, "random": true},
    "line_linked": {"enable": true, "distance": 150, "color": "#00bfff", "opacity": 0.4, "width": 1},
    "move": {"enable": true, "speed": 2, "random": true}
  },
  "interactivity": {"events": {"onhover": {"enable": true, "mode": "repulse"}}},
  "retina_detect": true
});
</script>

</body>
</html>

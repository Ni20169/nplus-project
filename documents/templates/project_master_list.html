<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目主数据管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .layout-root {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background-color: #333;
            color: white;
            padding: 20px;
        }
        .sidebar h3 {
            margin-bottom: 20px;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar a {
            display: block;
            padding: 10px;
            color: white;
            text-decoration: none;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        .sidebar a:hover {
            background-color: #555;
        }
        .main-content {
            flex: 1;
            padding: 20px;
        }
        .action-buttons {
            margin-bottom: 20px;
        }
        .action-buttons button {
            margin-right: 10px;
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
        }
        .action-buttons button:hover {
            background-color: #0069d9;
        }
        .panel {
            display: none;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: white;
            margin-bottom: 20px;
        }
        .data-table {
            display: none;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <div class="layout-root" id="layoutRoot">
        <div class="sidebar">
            <h3>项目管理</h3>
            <ul>
                <li><a href="#" onclick="showAddForm(); return false;">新增项目</a></li>
                <li><a href="#" onclick="showSearchForm(); return false;">查询项目</a></li>
                <li><a href="#" onclick="showUpdatePanel(); return false;">信息更新</a></li>
                <li><a href="#" onclick="refreshList(); return false;">项目列表</a></li>
                <li><a href="#" onclick="showApprovalPanel(); return false;">审批管理</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="action-buttons">
                <button onclick="showAddForm()">新增项目</button>
                <button onclick="showSearchForm()">查询项目</button>
                <button onclick="showUpdatePanel()">信息更新</button>
                <button onclick="refreshList()">项目列表</button>
                <button onclick="showApprovalPanel()">审批管理</button>
            </div>
            
            <div id="addForm" class="panel" style="display: block;">
                <h2>新增项目</h2>
                <p>新增项目表单内容</p>
            </div>
            
            <div id="searchForm" class="panel">
                <h2>查询项目</h2>
                <p>查询项目表单内容</p>
            </div>
            
            <div id="updatePanel" class="panel">
                <h2>信息更新</h2>
                <p>信息更新表单内容</p>
            </div>
            
            <div id="approvalPanel" class="panel">
                <h2>审批管理</h2>
                <p>审批管理表单内容</p>
            </div>
            
            <div class="data-table">
                <h2>项目列表</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>项目编码</th>
                            <th>项目名称</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>PROJ001</td>
                            <td>测试项目1</td>
                            <td>
                                <button>修改</button>
                                <button>删除</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        console.log('JavaScript loaded');
        
        // 全局函数定义
        function showAddForm() {
            console.log('showAddForm called');
            document.getElementById('addForm').style.display = 'block';
            document.getElementById('searchForm').style.display = 'none';
            document.getElementById('updatePanel').style.display = 'none';
            document.getElementById('approvalPanel').style.display = 'none';
            document.querySelector('.data-table').style.display = 'none';
        }
        
        function showSearchForm() {
            console.log('showSearchForm called');
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('searchForm').style.display = 'block';
            document.getElementById('updatePanel').style.display = 'none';
            document.getElementById('approvalPanel').style.display = 'none';
            document.querySelector('.data-table').style.display = 'block';
        }
        
        function showUpdatePanel() {
            console.log('showUpdatePanel called');
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('searchForm').style.display = 'none';
            document.getElementById('updatePanel').style.display = 'block';
            document.getElementById('approvalPanel').style.display = 'none';
            document.querySelector('.data-table').style.display = 'none';
        }
        
        function refreshList() {
            console.log('refreshList called');
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('searchForm').style.display = 'none';
            document.getElementById('updatePanel').style.display = 'none';
            document.getElementById('approvalPanel').style.display = 'none';
            document.querySelector('.data-table').style.display = 'block';
        }
        
        function showApprovalPanel() {
            console.log('showApprovalPanel called');
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('searchForm').style.display = 'none';
            document.getElementById('updatePanel').style.display = 'none';
            document.getElementById('approvalPanel').style.display = 'block';
            document.querySelector('.data-table').style.display = 'block';
        }
        
        console.log('All functions defined');
    </script>
</body>
</html>

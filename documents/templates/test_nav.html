<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页签切换</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .action-buttons {
            margin-bottom: 20px;
        }
        .action-buttons button {
            margin-right: 10px;
            padding: 8px 16px;
            cursor: pointer;
        }
        .panel {
            display: none;
            padding: 20px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            background: #f9f9f9;
        }
        .data-table {
            display: none;
            padding: 20px;
            border: 1px solid #ddd;
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>测试页签切换</h1>
    
    <div class="action-buttons">
        <button onclick="showAddForm()">新增项目</button>
        <button onclick="showSearchForm()">查询项目</button>
        <button onclick="showUpdatePanel()">信息更新</button>
        <button onclick="showList()">项目列表</button>
        <button onclick="showApprovalPanel()">审批管理</button>
    </div>
    
    <div id="addForm" class="panel" style="display: block;">
        <h2>新增项目</h2>
        <p>新增项目表单内容</p>
    </div>
    
    <div id="searchForm" class="panel">
        <h2>查询项目</h2>
        <p>查询项目表单内容</p>
    </div>
    
    <div id="updatePanel" class="panel">
        <h2>信息更新</h2>
        <p>信息更新表单内容</p>
    </div>
    
    <div id="approvalPanel" class="panel">
        <h2>审批管理</h2>
        <p>审批管理表单内容</p>
    </div>
    
    <div class="data-table" id="dataTable">
        <h2>项目列表</h2>
        <p>项目数据表格</p>
    </div>
    
    <script>
        // 全局函数
        function showAddForm() {
            console.log('showAddForm called');
            document.getElementById('addForm').style.display = 'block';
            document.getElementById('searchForm').style.display = 'none';
            document.getElementById('updatePanel').style.display = 'none';
            document.getElementById('approvalPanel').style.display = 'none';
            document.getElementById('dataTable').style.display = 'none';
        }
        
        function showSearchForm() {
            console.log('showSearchForm called');
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('searchForm').style.display = 'block';
            document.getElementById('updatePanel').style.display = 'none';
            document.getElementById('approvalPanel').style.display = 'none';
            document.getElementById('dataTable').style.display = 'block';
        }
        
        function showUpdatePanel() {
            console.log('showUpdatePanel called');
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('searchForm').style.display = 'none';
            document.getElementById('updatePanel').style.display = 'block';
            document.getElementById('approvalPanel').style.display = 'none';
            document.getElementById('dataTable').style.display = 'none';
        }
        
        function showList() {
            console.log('showList called');
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('searchForm').style.display = 'none';
            document.getElementById('updatePanel').style.display = 'none';
            document.getElementById('approvalPanel').style.display = 'none';
            document.getElementById('dataTable').style.display = 'block';
        }
        
        function showApprovalPanel() {
            console.log('showApprovalPanel called');
            document.getElementById('addForm').style.display = 'none';
            document.getElementById('searchForm').style.display = 'none';
            document.getElementById('updatePanel').style.display = 'none';
            document.getElementById('approvalPanel').style.display = 'block';
            document.getElementById('dataTable').style.display = 'block';
        }
        
        console.log('JavaScript loaded successfully');
    </script>
</body>
</html>
